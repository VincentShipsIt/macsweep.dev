name: DMG

# Builds a Developer ID-signed, notarized, stapled MacSweep.dmg from an existing
# release's macsweep-<tag>-macos.zip and uploads it to that release under the
# STABLE asset name `MacSweep.dmg` — so the landing page can link
# `releases/latest/download/MacSweep.dmg` forever.
#
# Two entry points:
#   * workflow_call — release.yml invokes this after publishing the zip, so every
#     release ships a notarized DMG automatically.
#   * workflow_dispatch — backfill a DMG for an already-published tag.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) whose app zip to package as a DMG"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) whose app zip to package as a DMG"
        required: true
        type: string

jobs:
  dmg:
    runs-on: macos-26
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Validate inputs and credentials
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::tag must be an exact semantic-version tag (vX.Y.Z)"
            exit 1
          }
          missing=()
          [[ -n "$DEVELOPER_ID_P12_BASE64" ]] || missing+=(DEVELOPER_ID_P12_BASE64)
          [[ -n "$DEVELOPER_ID_P12_PASSWORD" ]] || missing+=(DEVELOPER_ID_P12_PASSWORD)
          [[ -n "$APPLE_API_PRIVATE_KEY_P8_BASE64" ]] || missing+=(APPLE_API_PRIVATE_KEY_P8_BASE64)
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=(APPLE_TEAM_ID)
          [[ -n "$APPLE_API_KEY_ID" ]] || missing+=(APPLE_API_KEY_ID)
          [[ -n "$APPLE_API_ISSUER_ID" ]] || missing+=(APPLE_API_ISSUER_ID)
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing release secrets/variables: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Download and verify release app zip
        run: |
          set -euo pipefail
          mkdir -p work && cd work
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "macsweep-${RELEASE_TAG}-macos.zip"
          ditto -x -k "macsweep-${RELEASE_TAG}-macos.zip" extracted
          APP_PATH="$(find extracted -maxdepth 1 -name '*.app' -type d | head -1)"
          [[ -n "$APP_PATH" ]] || { echo "::error::No .app in release zip"; exit 1; }
          # The zip's app must already be notarized + stapled; the DMG inherits
          # a broken app otherwise, so fail closed here.
          xcrun stapler validate "$APP_PATH"
          echo "APP_PATH=$PWD/$APP_PATH" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate and notarization key
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/macsweep-dmg.keychain-db"
          P12_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$P12_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$P12_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ { print $2; exit }')"
          [[ -n "$SIGNING_IDENTITY" ]] || { echo "::error::No valid Developer ID Application identity found in the P12"; exit 1; }

          xcrun notarytool store-credentials macsweep-notary \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --validate

          rm -f "$P12_PATH" "$API_KEY_PATH"
          echo "MACSWEEP_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACSWEEP_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and staple DMG
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/dmg-staging"
          DMG_PATH="$PWD/work/MacSweep.dmg"
          rm -rf "$STAGING" && mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "MacSweep" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          codesign --force --timestamp \
            --sign "$MACSWEEP_SIGNING_IDENTITY" \
            --keychain "$MACSWEEP_KEYCHAIN_PATH" \
            "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --keychain-profile macsweep-notary \
            --keychain "$MACSWEEP_KEYCHAIN_PATH" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

          # Gatekeeper must accept the image itself — this is the whole point.
          spctl -a -vv -t open --context context:primary-signature "$DMG_PATH"

          shasum -a 256 "$DMG_PATH" | awk '{print $1}' > "$PWD/work/MacSweep.dmg.sha256"

      - name: Upload DMG to the release
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            work/MacSweep.dmg work/MacSweep.dmg.sha256

      - name: Delete temporary signing keychain
        if: always()
        run: |
          if [[ -n "${MACSWEEP_KEYCHAIN_PATH:-}" && -f "$MACSWEEP_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$MACSWEEP_KEYCHAIN_PATH"
          fi
