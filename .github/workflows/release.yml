name: Release

# One-command release: pushing a `vX.Y.Z` tag builds + smoke-tests the CLI, packages
# the GUI app, signs and publishes its Sparkle appcast, publishes formula/cask
# checksums, then bumps Formula/macsweep.rb and Casks/macsweep.rb in
# VincentShipsIt/homebrew-tap — with no manual steps.
#
# MacSweep's formula is build-from-source: its `url` is GitHub's auto-generated source
# tarball for the tag (archive/refs/tags/<tag>.tar.gz) and `sha256` is that tarball's
# digest. The cask is prebuilt: it downloads the Developer ID-signed, notarized,
# and stapled MacSweep.app zip. It depends on the formula, so
# `brew install --cask vincentshipsit/tap/macsweep` installs both GUI + CLI.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Toolchain
        run: swift --version

      - name: Validate release credentials
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::Release ref must be an exact semantic-version tag (vX.Y.Z)"
            exit 1
          }

          missing=()
          [[ -n "$DEVELOPER_ID_P12_BASE64" ]] || missing+=(DEVELOPER_ID_P12_BASE64)
          [[ -n "$DEVELOPER_ID_P12_PASSWORD" ]] || missing+=(DEVELOPER_ID_P12_PASSWORD)
          [[ -n "$APPLE_API_PRIVATE_KEY_P8_BASE64" ]] || missing+=(APPLE_API_PRIVATE_KEY_P8_BASE64)
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=(APPLE_TEAM_ID)
          [[ -n "$APPLE_API_KEY_ID" ]] || missing+=(APPLE_API_KEY_ID)
          [[ -n "$APPLE_API_ISSUER_ID" ]] || missing+=(APPLE_API_ISSUER_ID)
          [[ -n "$SPARKLE_PUBLIC_ED_KEY" ]] || missing+=(SPARKLE_PUBLIC_ED_KEY)
          [[ -n "$SPARKLE_PRIVATE_ED_KEY" ]] || missing+=(SPARKLE_PRIVATE_ED_KEY)

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing release environment secrets/variables: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Import Developer ID certificate and notarization key
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/macsweep-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$P12_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$P12_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ { print $2; exit }')"
          [[ -n "$SIGNING_IDENTITY" ]] || { echo "::error::No valid Developer ID Application identity found in the P12"; exit 1; }

          xcrun notarytool store-credentials macsweep-notary \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --validate

          rm -f "$P12_PATH" "$API_KEY_PATH"
          echo "MACSWEEP_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACSWEEP_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      # Release gate: the tagged commit must build the release CLI and report its
      # version — exactly how the Homebrew formula builds it. A broken tag fails here
      # BEFORE any release is published or the tap is bumped.
      - name: Build & smoke-test CLI
        run: |
          set -euo pipefail
          swift build -c release --product macsweep --package-path MacSweep
          "MacSweep/.build/release/macsweep" version

      - name: Archive and export Developer ID app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/MacSweep.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/MacSweepExport"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"

          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
          xcodebuild archive \
            -project MacSweep/MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$RUNNER_TEMP/MacSweepDerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACSWEEP_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>developer-id</string>
            <key>signingCertificate</key>
            <string>$MACSWEEP_SIGNING_IDENTITY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_PATH"

          APP="$EXPORT_PATH/MacSweep.app"
          test -d "$APP"
          APP_INFO="$APP/Contents/Info.plist"
          EXPECTED_VERSION="${RELEASE_TAG#v}"
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_INFO")" == "$EXPECTED_VERSION" ]] || {
            echo "::error::CFBundleShortVersionString does not match $RELEASE_TAG"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_INFO")" == "$EXPECTED_VERSION" ]] || {
            echo "::error::CFBundleVersion does not match $RELEASE_TAG"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$APP_INFO")" == "$SPARKLE_PUBLIC_ED_KEY" ]] || {
            echo "::error::Sparkle public key is missing from the exported app"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$APP_INFO")" == "https://github.com/VincentShipsIt/macsweep.dev/releases/latest/download/appcast.xml" ]] || {
            echo "::error::Sparkle appcast URL is incorrect"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$APP_INFO")" == "MacSweep" ]] || {
            echo "::error::CFBundleDisplayName is not MacSweep"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleName' "$APP_INFO")" == "MacSweep" ]] || {
            echo "::error::CFBundleName is not MacSweep"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_INFO")" == "dev.macsweep.app" ]] || {
            echo "::error::CFBundleIdentifier changed from dev.macsweep.app"
            exit 1
          }

          codesign --verify --deep --strict --verbose=4 "$APP"
          SIGNATURE_INFO="$(codesign -dvv "$APP" 2>&1)"
          grep -q '^Timestamp=' <<< "$SIGNATURE_INFO" || { echo "::error::Developer ID signature has no secure timestamp"; exit 1; }
          grep -q 'flags=.*runtime' <<< "$SIGNATURE_INFO" || { echo "::error::Hardened runtime is not enabled"; exit 1; }
          ACTUAL_TEAM_ID="$(awk -F= '/^TeamIdentifier=/{print $2; exit}' <<< "$SIGNATURE_INFO")"
          [[ "$ACTUAL_TEAM_ID" == "$APPLE_TEAM_ID" ]] || { echo "::error::Signed TeamIdentifier does not match APPLE_TEAM_ID"; exit 1; }

          ENTITLEMENTS="$RUNNER_TEMP/MacSweep.entitlements.plist"
          codesign -d --entitlements :- "$APP" > "$ENTITLEMENTS"
          plutil -lint "$ENTITLEMENTS"
          if /usr/libexec/PlistBuddy -c 'Print :com.apple.security.get-task-allow' "$ENTITLEMENTS" 2>/dev/null | grep -q '^true$'; then
            echo "::error::Release app contains forbidden com.apple.security.get-task-allow entitlement"
            exit 1
          fi

          echo "MACSWEEP_APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Notarize, staple, and package GUI app
        run: |
          set -euo pipefail
          SUBMISSION_ZIP="$RUNNER_TEMP/macsweep-notarization.zip"
          NOTARY_RESULT="$RUNNER_TEMP/notary-result.json"
          NOTARY_LOG="$RUNNER_TEMP/notary-log.json"

          ditto -c -k --sequesterRsrc --keepParent "$MACSWEEP_APP_PATH" "$SUBMISSION_ZIP"

          set +e
          xcrun notarytool submit "$SUBMISSION_ZIP" \
            --keychain-profile macsweep-notary \
            --keychain "$MACSWEEP_KEYCHAIN_PATH" \
            --wait \
            --timeout 60m \
            --output-format json > "$NOTARY_RESULT"
          NOTARY_EXIT=$?
          set -e

          cat "$NOTARY_RESULT"
          SUBMISSION_ID="$(plutil -extract id raw -o - "$NOTARY_RESULT" 2>/dev/null || true)"
          NOTARY_STATUS="$(plutil -extract status raw -o - "$NOTARY_RESULT" 2>/dev/null || true)"
          if [[ "$NOTARY_EXIT" -ne 0 || "$NOTARY_STATUS" != "Accepted" ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" "$NOTARY_LOG" \
                --keychain-profile macsweep-notary \
                --keychain "$MACSWEEP_KEYCHAIN_PATH" || true
              test ! -f "$NOTARY_LOG" || cat "$NOTARY_LOG"
            fi
            echo "::error::Apple notarization did not return Accepted"
            exit 1
          fi

          xcrun stapler staple "$MACSWEEP_APP_PATH"
          xcrun stapler validate "$MACSWEEP_APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$MACSWEEP_APP_PATH"
          spctl --assess --type execute --verbose=4 "$MACSWEEP_APP_PATH"

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "$MACSWEEP_APP_PATH" \
            "dist/macsweep-${RELEASE_TAG}-macos.zip"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          GENERATE_APPCAST="$(find "$RUNNER_TEMP/MacSweepDerivedData/SourcePackages" \
            -type f -path '*/Sparkle/bin/generate_appcast' -print -quit)"
          [[ -x "$GENERATE_APPCAST" ]] || {
            echo "::error::Sparkle generate_appcast tool was not resolved by Xcode"
            exit 1
          }

          APPCAST_INPUT="$RUNNER_TEMP/MacSweepAppcast"
          mkdir -p "$APPCAST_INPUT"
          cp "dist/macsweep-${RELEASE_TAG}-macos.zip" "$APPCAST_INPUT/"

          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" \
            --link "https://macsweep.dev/" \
            --maximum-versions 1 \
            -o "$GITHUB_WORKSPACE/appcast.xml" \
            "$APPCAST_INPUT"

          test -s appcast.xml
          grep -q 'sparkle:edSignature=' appcast.xml || {
            echo "::error::Generated appcast is not signed"
            exit 1
          }
          grep -q "macsweep-${RELEASE_TAG}-macos.zip" appcast.xml || {
            echo "::error::Generated appcast does not reference the release archive"
            exit 1
          }

      # The formula pins GitHub's source tarball checksum. The cask pins the prebuilt
      # app zip checksum. Publish both digests so the tap bump is verifiable end-to-end.
      - name: Compute release checksums
        id: sha
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL --connect-timeout 15 --max-time 180 --retry 3 "$URL" -o "macsweep-${TAG}.tar.gz"
          SOURCE_SHA256="$(shasum -a 256 "macsweep-${TAG}.tar.gz" | cut -d ' ' -f 1)"
          [[ "$SOURCE_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::computed source sha256 is not a 64-hex digest"; exit 1; }
          echo "$SOURCE_SHA256" > "macsweep-${TAG}.tar.gz.sha256"
          echo "source_sha256=$SOURCE_SHA256" >> "$GITHUB_OUTPUT"

          APP_ZIP="dist/macsweep-${TAG}-macos.zip"
          test -f "$APP_ZIP"
          APP_SHA256="$(shasum -a 256 "$APP_ZIP" | cut -d ' ' -f 1)"
          [[ "$APP_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::computed app sha256 is not a 64-hex digest"; exit 1; }
          echo "$APP_SHA256" > "macsweep-${TAG}-macos.zip.sha256"
          echo "app_sha256=$APP_SHA256" >> "$GITHUB_OUTPUT"

          {
            echo "### MacSweep ${TAG}"
            echo ""
            echo "Source tarball SHA256: \`${SOURCE_SHA256}\`"
            echo "App zip SHA256: \`${APP_SHA256}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/macsweep-${{ env.RELEASE_TAG }}-macos.zip
            appcast.xml
            macsweep-${{ env.RELEASE_TAG }}-macos.zip.sha256
            macsweep-${{ env.RELEASE_TAG }}.tar.gz.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/macsweep-signing.keychain-db" 2>/dev/null || true

  # Bump the formula in the tap AFTER the release publishes. Called directly as a job
  # (not via `release: published`) because a release created by the build job's
  # GITHUB_TOKEN does NOT cascade-trigger other workflows — so an event-triggered
  # tap update would silently never run. `secrets: inherit` passes TAP_GITHUB_TOKEN.
  update-homebrew:
    needs: build
    uses: ./.github/workflows/update-homebrew.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  # Package the released app zip as a Developer ID-signed, notarized, stapled
  # MacSweep.dmg under a STABLE asset name, so the landing page's download button
  # can link releases/latest/download/MacSweep.dmg across versions.
  dmg:
    needs: build
    uses: ./.github/workflows/dmg.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
    permissions:
      contents: write
