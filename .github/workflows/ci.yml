name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      # Build the release CLI product — this is the exact artifact the Homebrew
      # formula builds, so CI fails the same way a `brew install` would.
      - name: Build release CLI (SPM)
        run: swift build -c release --product macsweep --package-path MacSweep

      # Build the release app target too: the Homebrew cask packages this bundle.
      - name: Build release GUI app (Xcode)
        run: |
          xcodebuild \
            -project MacSweep/MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            build

      # scripts/coverage.sh wraps scripts/test.sh (which auto-detects the
      # toolchain: plain `swift test` on this full-Xcode runner, standalone
      # swift-testing runner on a CLT-only host) with --enable-code-coverage,
      # publishes the safety-critical coverage table to the job summary, and
      # fails the job if an enforced file drops below its floor.
      - name: Test (swift-testing) + coverage
        run: ./scripts/coverage.sh

  # Deterministic CLI e2e safety smoke suite: exit codes, fixture scan,
  # dry-run/apply-gate non-destructiveness, protected-path (shred) refusal.
  # All fixtures are self-created under $TMPDIR; no user directory is modified.
  e2e-smoke:
    name: E2E Smoke
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Run e2e smoke suite
        run: zsh ./scripts/e2e.sh

  # Visual QA: render every GUI state via scripts/render-screenshots.sh and
  # publish the PNGs as a build artifact for human review. PR-only — the
  # renders are review aids, not a gate, and the compile is expensive.
  visual-snapshots:
    name: Visual Snapshots
    runs-on: macos-26
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Render GUI snapshots
        run: zsh ./scripts/render-screenshots.sh

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: gui-snapshots
          path: scripts/screenshots/
          retention-days: 14

  # NOTE: the Homebrew formula and cask live in VincentShipsIt/homebrew-tap
  # (Formula/macsweep.rb and Casks/macsweep.rb). Tap-side install/audit gates run
  # in that repo; this repo verifies the source products still build.
