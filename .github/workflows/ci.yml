name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      # Build the release CLI product — this is the exact artifact the Homebrew
      # formula builds, so CI fails the same way a `brew install` would.
      - name: Build release CLI (SPM)
        run: swift build -c release --product macsweep --package-path MacSweep

      # scripts/test.sh auto-detects the toolchain: on this full-Xcode runner the
      # xctest host is present so it runs plain `swift test`; on a CLT-only host it
      # falls back to the standalone swift-testing runner. One canonical command.
      - name: Test (swift-testing)
        run: ./scripts/test.sh

  # Release gate: only runs when a vX.Y.Z tag is pushed. Proves the pinned Homebrew
  # formula is self-consistent and actually installable the way an end user would
  # `brew install` it — catching the "bumped the url but forgot the sha256" mistake
  # the formula's RELEASE CHECKLIST warns about.
  homebrew-release:
    name: Homebrew formula (tagged release)
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # The formula pins `url` + `sha256`. Download the exact tarball the url points
      # at and assert its checksum equals the pinned one. A mismatch fails the
      # release before anyone can `brew install` a formula that wouldn't verify.
      - name: Validate formula sha256 matches its pinned tarball
        run: |
          set -euo pipefail
          formula="Formula/macsweep.rb"
          url=$(grep -m1 -E '^\s*url ' "$formula" | sed -E 's/.*"([^"]+)".*/\1/')
          pinned=$(grep -m1 -E '^\s*sha256 ' "$formula" | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Formula url:    $url"
          echo "Formula sha256: $pinned"
          curl -fsSL "$url" -o /tmp/macsweep-src.tar.gz
          actual=$(shasum -a 256 /tmp/macsweep-src.tar.gz | awk '{print $1}')
          echo "Tarball sha256: $actual"
          if [ "$actual" != "$pinned" ]; then
            echo "::error::Formula sha256 ($pinned) does not match tarball ($actual). Update Formula/macsweep.rb."
            exit 1
          fi

      # Install exactly as a user would, building from source, then run the
      # formula's own `test do` block.
      - name: Install + test formula (build from source)
        run: |
          set -euo pipefail
          brew install --build-from-source --formula ./Formula/macsweep.rb
          brew test --formula ./Formula/macsweep.rb
          macsweep version
