name: Nightly App Channel

# Rolling nightly update channel: builds master into a Developer ID-signed,
# notarized MacSweep.app and publishes it plus a signed Sparkle appcast to the
# rolling `nightly` prerelease. The in-app Settings ▸ General "Update channel"
# picker reads that feed (releases/download/nightly/appcast.xml), so a nightly
# can be installed through Sparkle without cutting a release.
#
# Channel invariants:
#   - The `nightly` release is always a prerelease and never "latest", so the
#     stable feed (releases/latest/download/appcast.xml), the Homebrew cask,
#     and the landing-page DMG are untouched.
#   - Versions are stamped in CI only (never committed): marketing version
#     `X.Y.Z-nightly.YYYYMMDD` and Sparkle build `X.Y.Z.YYYYMMDDHHMM`, both on
#     top of master's MacSweepVersion.swift base. The build number sorts above
#     the stable X.Y.Z it derives from and below the next stable release, so
#     channel switches behave sanely in both directions.
#   - Skips entirely when master hasn't moved since the last nightly.
#
# Signing runs in the `nightly` environment: same secrets/variables as
# `release`, but WITHOUT required reviewers (a reviewer gate would stall every
# scheduled run). Restrict that environment to the master branch so only
# master builds can read the signing keys.

on:
  schedule:
    - cron: "37 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-app
  cancel-in-progress: false

jobs:
  changes:
    name: Master moved since last nightly?
    if: github.repository == 'VincentShipsIt/macsweep.dev'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Compare master with the nightly tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NIGHTLY_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/nightly" --jq '.object.sha' 2>/dev/null || true)"
          if [[ "$NIGHTLY_SHA" == "$GITHUB_SHA" ]]; then
            echo "master unchanged since last nightly ($GITHUB_SHA); skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "building nightly for $GITHUB_SHA (previous: ${NIGHTLY_SHA:-none})"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & publish nightly
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 90
    environment: nightly
    permissions:
      contents: write
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Toolchain
        run: swift --version

      - name: Validate nightly credentials
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$DEVELOPER_ID_P12_BASE64" ]] || missing+=(DEVELOPER_ID_P12_BASE64)
          [[ -n "$DEVELOPER_ID_P12_PASSWORD" ]] || missing+=(DEVELOPER_ID_P12_PASSWORD)
          [[ -n "$APPLE_API_PRIVATE_KEY_P8_BASE64" ]] || missing+=(APPLE_API_PRIVATE_KEY_P8_BASE64)
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=(APPLE_TEAM_ID)
          [[ -n "$APPLE_API_KEY_ID" ]] || missing+=(APPLE_API_KEY_ID)
          [[ -n "$APPLE_API_ISSUER_ID" ]] || missing+=(APPLE_API_ISSUER_ID)
          [[ -n "$SPARKLE_PUBLIC_ED_KEY" ]] || missing+=(SPARKLE_PUBLIC_ED_KEY)
          [[ -n "$SPARKLE_PRIVATE_ED_KEY" ]] || missing+=(SPARKLE_PRIVATE_ED_KEY)

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing nightly environment secrets/variables (mirror them from the release environment): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Import Developer ID certificate and notarization key
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/macsweep-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$P12_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$P12_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ { print $2; exit }')"
          [[ -n "$SIGNING_IDENTITY" ]] || { echo "::error::No valid Developer ID Application identity found in the P12"; exit 1; }

          xcrun notarytool store-credentials macsweep-notary \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --validate

          rm -f "$P12_PATH" "$API_KEY_PATH"
          echo "MACSWEEP_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACSWEEP_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      # Stamp the nightly version into the working tree (CI-only; never
      # committed). The pbxproj values are quoted because the marketing version
      # contains a dash, which OpenStep plists cannot carry unquoted.
      - name: Stamp nightly version
        run: |
          set -euo pipefail
          BASE="$(grep 'static let current' MacSweep/Sources/Core/MacSweepVersion.swift | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          [[ "$BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::MacSweepVersion.swift base version is not X.Y.Z: '$BASE'"
            exit 1
          }
          NIGHTLY_VERSION="${BASE}-nightly.$(date -u +%Y%m%d)"
          NIGHTLY_BUILD="${BASE}.$(date -u +%Y%m%d%H%M)"

          PBXPROJ="MacSweep/MacSweep.xcodeproj/project.pbxproj"
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = \"${NIGHTLY_VERSION}\";/" "$PBXPROJ"
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = \"${NIGHTLY_BUILD}\";/" "$PBXPROJ"
          sed -i '' "s/static let current = \".*\"/static let current = \"${NIGHTLY_VERSION}\"/" \
            MacSweep/Sources/Core/MacSweepVersion.swift

          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"
          echo "NIGHTLY_BUILD=$NIGHTLY_BUILD" >> "$GITHUB_ENV"
          echo "stamped $NIGHTLY_VERSION (build $NIGHTLY_BUILD) from base $BASE"

      - name: Archive and export Developer ID app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/MacSweep.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/MacSweepExport"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"

          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
          xcodebuild archive \
            -project MacSweep/MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$RUNNER_TEMP/MacSweepDerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACSWEEP_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>developer-id</string>
            <key>signingCertificate</key>
            <string>$MACSWEEP_SIGNING_IDENTITY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_PATH"

          APP="$EXPORT_PATH/MacSweep.app"
          test -d "$APP"
          APP_INFO="$APP/Contents/Info.plist"
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_INFO")" == "$NIGHTLY_VERSION" ]] || {
            echo "::error::CFBundleShortVersionString does not match $NIGHTLY_VERSION"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_INFO")" == "$NIGHTLY_BUILD" ]] || {
            echo "::error::CFBundleVersion does not match $NIGHTLY_BUILD"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$APP_INFO")" == "$SPARKLE_PUBLIC_ED_KEY" ]] || {
            echo "::error::Sparkle public key is missing from the exported app"
            exit 1
          }
          # Nightlies keep the stable SUFeedURL baked in; the nightly feed is
          # selected at runtime by the in-app channel picker.
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$APP_INFO")" == "https://github.com/VincentShipsIt/macsweep.dev/releases/latest/download/appcast.xml" ]] || {
            echo "::error::Sparkle appcast URL is incorrect"
            exit 1
          }
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_INFO")" == "dev.macsweep.app" ]] || {
            echo "::error::CFBundleIdentifier changed from dev.macsweep.app"
            exit 1
          }

          codesign --verify --deep --strict --verbose=4 "$APP"
          SIGNATURE_INFO="$(codesign -dvv "$APP" 2>&1)"
          grep -q '^Timestamp=' <<< "$SIGNATURE_INFO" || { echo "::error::Developer ID signature has no secure timestamp"; exit 1; }
          grep -q 'flags=.*runtime' <<< "$SIGNATURE_INFO" || { echo "::error::Hardened runtime is not enabled"; exit 1; }
          ACTUAL_TEAM_ID="$(awk -F= '/^TeamIdentifier=/{print $2; exit}' <<< "$SIGNATURE_INFO")"
          [[ "$ACTUAL_TEAM_ID" == "$APPLE_TEAM_ID" ]] || { echo "::error::Signed TeamIdentifier does not match APPLE_TEAM_ID"; exit 1; }

          ENTITLEMENTS="$RUNNER_TEMP/MacSweep.entitlements.plist"
          codesign -d --entitlements :- "$APP" > "$ENTITLEMENTS"
          plutil -lint "$ENTITLEMENTS"
          if /usr/libexec/PlistBuddy -c 'Print :com.apple.security.get-task-allow' "$ENTITLEMENTS" 2>/dev/null | grep -q '^true$'; then
            echo "::error::Nightly app contains forbidden com.apple.security.get-task-allow entitlement"
            exit 1
          fi

          echo "MACSWEEP_APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Notarize, staple, and package nightly app
        run: |
          set -euo pipefail
          SUBMISSION_ZIP="$RUNNER_TEMP/macsweep-notarization.zip"
          NOTARY_RESULT="$RUNNER_TEMP/notary-result.json"
          NOTARY_LOG="$RUNNER_TEMP/notary-log.json"

          ditto -c -k --sequesterRsrc --keepParent "$MACSWEEP_APP_PATH" "$SUBMISSION_ZIP"

          set +e
          xcrun notarytool submit "$SUBMISSION_ZIP" \
            --keychain-profile macsweep-notary \
            --keychain "$MACSWEEP_KEYCHAIN_PATH" \
            --wait \
            --timeout 60m \
            --output-format json > "$NOTARY_RESULT"
          NOTARY_EXIT=$?
          set -e

          cat "$NOTARY_RESULT"
          SUBMISSION_ID="$(plutil -extract id raw -o - "$NOTARY_RESULT" 2>/dev/null || true)"
          NOTARY_STATUS="$(plutil -extract status raw -o - "$NOTARY_RESULT" 2>/dev/null || true)"
          if [[ "$NOTARY_EXIT" -ne 0 || "$NOTARY_STATUS" != "Accepted" ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" "$NOTARY_LOG" \
                --keychain-profile macsweep-notary \
                --keychain "$MACSWEEP_KEYCHAIN_PATH" || true
              test ! -f "$NOTARY_LOG" || cat "$NOTARY_LOG"
            fi
            echo "::error::Apple notarization did not return Accepted"
            exit 1
          fi

          xcrun stapler staple "$MACSWEEP_APP_PATH"
          xcrun stapler validate "$MACSWEEP_APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$MACSWEEP_APP_PATH"
          spctl --assess --type execute --verbose=4 "$MACSWEEP_APP_PATH"

          # Fixed asset name: the rolling release replaces it in place, and the
          # appcast entry (which carries the real version) points at it.
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "$MACSWEEP_APP_PATH" \
            "dist/macsweep-nightly-macos.zip"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          GENERATE_APPCAST="$(find "$RUNNER_TEMP/MacSweepDerivedData/SourcePackages" \
            -type f -path '*/Sparkle/bin/generate_appcast' -print -quit)"
          [[ -x "$GENERATE_APPCAST" ]] || {
            echo "::error::Sparkle generate_appcast tool was not resolved by Xcode"
            exit 1
          }

          APPCAST_INPUT="$RUNNER_TEMP/MacSweepAppcast"
          mkdir -p "$APPCAST_INPUT"
          cp "dist/macsweep-nightly-macos.zip" "$APPCAST_INPUT/"

          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/" \
            --link "https://macsweep.dev/" \
            --maximum-versions 1 \
            -o "$GITHUB_WORKSPACE/appcast.xml" \
            "$APPCAST_INPUT"

          test -s appcast.xml
          grep -q 'sparkle:edSignature=' appcast.xml || {
            echo "::error::Generated appcast is not signed"
            exit 1
          }
          grep -q "macsweep-nightly-macos.zip" appcast.xml || {
            echo "::error::Generated appcast does not reference the nightly archive"
            exit 1
          }
          grep -q "$NIGHTLY_BUILD" appcast.xml || {
            echo "::error::Generated appcast does not carry the nightly build number"
            exit 1
          }

      - name: Publish rolling nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APP_ZIP="dist/macsweep-nightly-macos.zip"
          APP_SHA256="$(shasum -a 256 "$APP_ZIP" | cut -d ' ' -f 1)"
          [[ "$APP_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::computed app sha256 is not a 64-hex digest"; exit 1; }
          echo "$APP_SHA256" > macsweep-nightly-macos.zip.sha256

          NOTES="Rolling nightly build from master. Untested beyond CI — use the Stable channel unless you are testing.

          - Version: \`${NIGHTLY_VERSION}\` (build \`${NIGHTLY_BUILD}\`)
          - Commit: ${GITHUB_SHA}
          - App zip SHA256: \`${APP_SHA256}\`"

          # Move the rolling tag to the built commit; the release follows it.
          git push origin "+${GITHUB_SHA}:refs/tags/nightly"

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --prerelease \
              --title "Nightly (${NIGHTLY_VERSION})" \
              --notes "$NOTES"
          else
            gh release create nightly \
              --prerelease \
              --title "Nightly (${NIGHTLY_VERSION})" \
              --notes "$NOTES"
          fi

          gh release upload nightly --clobber \
            "$APP_ZIP" \
            appcast.xml \
            macsweep-nightly-macos.zip.sha256

          {
            echo "### MacSweep nightly ${NIGHTLY_VERSION}"
            echo ""
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "App zip SHA256: \`${APP_SHA256}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete temporary signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/macsweep-signing.keychain-db" 2>/dev/null || true
