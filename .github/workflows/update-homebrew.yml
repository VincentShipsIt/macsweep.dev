name: Update Homebrew

# Bumps Formula/macsweep.rb and Casks/macsweep.rb in VincentShipsIt/homebrew-tap to a
# published release. The formula remains the build-from-source CLI. The cask installs
# the GUI app and depends on the formula, so GUI installs pull in the CLI too.
#
# Reusable (`workflow_call`) so the Release workflow can call it as a second job —
# this is deliberate. A `release: published` trigger does NOT work: the release is
# created by the Release job's GITHUB_TOKEN, and GitHub will not cascade-trigger
# workflows from that token, so the tap would silently never update. `workflow_dispatch`
# is the manual fallback / re-run.
#
# Requires the `TAP_GITHUB_TOKEN` repo secret: a token with `contents: write` on
# VincentShipsIt/homebrew-tap (the default GITHUB_TOKEN cannot push to another repo).

on:
  workflow_call:
    inputs:
      version:
        description: "Tag to publish to the tap (e.g. v1.0.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to publish to the tap (e.g. v1.0.3)"
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Resolve version
        id: version
        run: |
          # inputs.version is populated for both workflow_call and workflow_dispatch.
          TAG="${{ inputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download + validate release checksums
        id: sha
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          curl -fsSL \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "https://github.com/VincentShipsIt/macsweep/releases/download/${TAG}/macsweep-${TAG}.tar.gz.sha256" \
            -o source-sha256.txt
          curl -fsSL \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "https://github.com/VincentShipsIt/macsweep/releases/download/${TAG}/macsweep-${TAG}-macos.zip.sha256" \
            -o app-sha256.txt
          # Validate the asset is a bare 64-hex SHA256 before trusting it. On a 404 or
          # redirect-to-error, curl -f fails the step; this guards the case where a 200
          # body is something other than a digest, so an error body can never be
          # committed into the formula/cask and break every `brew install` checksum.
          SOURCE_SHA256="$(tr -d '[:space:]' < source-sha256.txt)"
          APP_SHA256="$(tr -d '[:space:]' < app-sha256.txt)"
          [[ "$SOURCE_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::Downloaded source sha256 is not a valid 64-hex digest"; exit 1; }
          [[ "$APP_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::Downloaded app sha256 is not a valid 64-hex digest"; exit 1; }
          echo "source_sha256=$SOURCE_SHA256" >> "$GITHUB_OUTPUT"
          echo "app_sha256=$APP_SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: VincentShipsIt/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Bump formula url + sha256
        run: |
          set -euo pipefail
          cd homebrew-tap
          TAG="${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.source_sha256 }}"
          F="Formula/macsweep.rb"

          # Formula version is derived by Homebrew from the tag in the url, so only the
          # url's tag segment and the sha256 change. Replace the path between
          # /archive/refs/tags/ and .tar.gz (format-agnostic), then the 64-hex sha256.
          sed -i -E "s#(/archive/refs/tags/)[^\"]*(\.tar\.gz)#\1${TAG}\2#" "$F"
          sed -i -E "s#^([[:space:]]*sha256 )\"[0-9a-f]{64}\"#\1\"${SHA256}\"#" "$F"

          echo "----- updated formula (url + sha256) -----"
          grep -E '^\s*(url|sha256) ' "$F"

          # Fail loudly if either bump didn't take (e.g. the formula's shape changed).
          grep -q "/archive/refs/tags/${TAG}.tar.gz" "$F" || { echo "::error::url was not updated to ${TAG}"; exit 1; }
          grep -q "sha256 \"${SHA256}\"" "$F" || { echo "::error::sha256 was not updated"; exit 1; }

      - name: Create or bump cask
        run: |
          set -euo pipefail
          cd homebrew-tap
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          SHA256="${{ steps.sha.outputs.app_sha256 }}"
          C="Casks/macsweep.rb"
          mkdir -p "$(dirname "$C")"

          cat > "$C" <<RUBY
          cask "macsweep" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/VincentShipsIt/macsweep/releases/download/v#{version}/macsweep-v#{version}-macos.zip",
                verified: "github.com/VincentShipsIt/macsweep/"
            name "MacSweep"
            desc "Native macOS system cleaner"
            homepage "https://github.com/VincentShipsIt/macsweep"

            depends_on formula: "vincentshipsit/tap/macsweep"
            depends_on macos: ">= :tahoe"

            app "MacSweep.app"
          end
          RUBY

          echo "----- updated cask (url + sha256 + dependency) -----"
          grep -E '^\s*(version|sha256|url|depends_on|app) ' "$C"

          # Fail loudly if the generated cask does not install the GUI and depend on
          # the formula that provides the CLI.
          grep -q "version \"${VERSION}\"" "$C" || { echo "::error::cask version was not updated"; exit 1; }
          grep -q "sha256 \"${SHA256}\"" "$C" || { echo "::error::cask sha256 was not updated"; exit 1; }
          grep -q 'macsweep-v#{version}-macos.zip' "$C" || { echo "::error::cask url does not reference the app zip"; exit 1; }
          grep -q 'depends_on formula: "vincentshipsit/tap/macsweep"' "$C" || { echo "::error::cask does not depend on the CLI formula"; exit 1; }
          grep -q 'app "MacSweep.app"' "$C" || { echo "::error::cask does not install MacSweep.app"; exit 1; }

      - name: Commit + push
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/macsweep.rb Casks/macsweep.rb
          git diff --staged --quiet || git commit -m "Update macsweep to ${{ steps.version.outputs.tag }}"
          git push
