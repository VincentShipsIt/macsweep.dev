name: MacSweep
options:
  bundleIdPrefix: dev.macsweep
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.8"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MacSweep:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "CLI/**"
          - "CLIKit/**"
    settings:
      base:
        # Brand is the domain: the bundle ships as macsweep.dev.app. Target and
        # module stay `MacSweep` because Swift module names cannot contain dots.
        PRODUCT_NAME: macsweep.dev
        PRODUCT_BUNDLE_IDENTIFIER: dev.macsweep.app
        INFOPLIST_FILE: Info.plist
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: macsweep.dev
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 macsweep.dev. All rights reserved."
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # Disable sandbox for full disk access
        ENABLE_APP_SANDBOX: NO
        # Hardened runtime required for notarization
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          # Distribution builds must never carry the debugger-injection entitlement.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    entitlements:
      path: MacSweep.entitlements
      properties:
        com.apple.security.automation.apple-events: true

  MacSweepCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.macsweep.core
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"

  MacSweepCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/CLI
      - path: Sources/CLIKit
    dependencies:
      - target: MacSweepCore
    settings:
      base:
        PRODUCT_NAME: macsweep
        PRODUCT_BUNDLE_IDENTIFIER: dev.macsweep.cli
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"

schemes:
  MacSweep:
    build:
      targets:
        MacSweep: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  MacSweepCLI:
    build:
      targets:
        MacSweepCLI: all
    run:
      config: Debug
