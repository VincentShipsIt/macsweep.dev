name: MacSweep
options:
  bundleIdPrefix: com.vincentshipsit
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"

targets:
  MacSweep:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "CLI/**"
          - "CLIKit/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentshipsit.macsweep
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: MacSweep
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 MacSweep. All rights reserved."
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # Disable sandbox for full disk access
        ENABLE_APP_SANDBOX: NO
        # Hardened runtime required for notarization
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: MacSweep.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.automation.apple-events: true

  MacSweepCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentshipsit.macsweep.core
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"

  MacSweepCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/CLI
      - path: Sources/CLIKit
    dependencies:
      - target: MacSweepCore
    settings:
      base:
        PRODUCT_NAME: macsweep
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentshipsit.macsweep.cli
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"

schemes:
  MacSweep:
    build:
      targets:
        MacSweep: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  MacSweepCLI:
    build:
      targets:
        MacSweepCLI: all
    run:
      config: Debug
